<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · Feedback System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa; min-height: 100vh; color: #1a1a1a; line-height: 1.5;
            transition: background 0.3s, color 0.3s;
        }
        body.dark-theme { background: #0f0f0f; color: #e5e5e5; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .container { animation: fadeIn 0.5s ease-out; }
        .kpi-card { animation: scaleIn 0.4s ease-out; transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s, border-color 0.3s; }
        .kpi-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        body.dark-theme .kpi-card:hover { box-shadow: 0 8px 20px rgba(255,255,255,0.05); }
        .chart-container { animation: scaleIn 0.4s ease-out 0.1s backwards; }
        .feedbacks-table { animation: scaleIn 0.4s ease-out 0.2s backwards; }

        body.dark-theme .header { background: #1a1a1a; border-bottom-color: #333333; }
        body.dark-theme .logo { color: #ffffff; }
        body.dark-theme .nav-links a { color: #999999; }
        body.dark-theme .nav-links a:hover,
        body.dark-theme .nav-links a.active { color: #ffffff; }
        body.dark-theme .btn-outline { border-color: #444444; color: #e5e5e5; }
        body.dark-theme .btn-outline:hover { border-color: #ffffff; background: #2a2a2a; }
        body.dark-theme .kpi-card,
        body.dark-theme .chart-container,
        body.dark-theme .feedbacks-table { background: #1a1a1a; border-color: #333333; }
        body.dark-theme .kpi-label { color: #999999; }
        body.dark-theme .kpi-value { color: #ffffff; }
        body.dark-theme .chart-title,
        body.dark-theme .table-title { color: #ffffff; }
        body.dark-theme th { background: #0f0f0f; color: #999999; border-bottom-color: #333333; }
        body.dark-theme td { border-bottom-color: #2a2a2a; color: #e5e5e5; }
        body.dark-theme tbody tr:hover { background: rgba(255,255,255,0.03); }
        body.dark-theme .status-new { background: #1e3a5f; color: #7ab7ef; }
        body.dark-theme .status-in_progress { background: #4a3520; color: #fbbf24; }
        body.dark-theme .status-completed { background: #1a3a2a; color: #6ee7b7; }
        body.dark-theme .loading { color: #999999; }
        body.dark-theme .view-all a { color: #e5e5e5; }
        body.dark-theme .user-name { color: #999999; }

        .theme-toggle {
            background: none; border: 1px solid #d4d4d4; border-radius: 24px; padding: 6px 14px;
            cursor: pointer; font-size: 13px; font-weight: 500; display: flex; align-items: center;
            gap: 8px; transition: all 0.3s; margin-right: 8px; color: #1a1a1a;
        }
        body.dark-theme .theme-toggle { border-color: #444444; color: #e5e5e5; }
        .theme-toggle:hover { border-color: #1a1a1a; background: #f5f5f5; transform: scale(1.02); }
        body.dark-theme .theme-toggle:hover { border-color: #ffffff; background: #2a2a2a; }

        .theme-icon { width: 18px; height: 18px; display: inline-block; transition: transform 0.3s; }
        .theme-icon svg { width: 100%; height: 100%; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        body:not(.dark-theme) .theme-icon svg path { stroke: #1a1a1a; fill: #1a1a1a; }
        body.dark-theme .theme-icon svg circle,
        body.dark-theme .theme-icon svg line { stroke: #ffffff; }
        .theme-toggle:hover .theme-icon { transform: rotate(10deg); }

        .header {
            background: #ffffff; padding: 20px 40px; border-bottom: 1px solid #e5e5e5;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.3s, border-color 0.3s; min-height: 73px;
        }
        .logo {
            font-size: 20px; font-weight: 500; letter-spacing: -0.5px; color: #1a1a1a;
            text-decoration: none; transition: transform 0.3s, color 0.3s; display: inline-block;
        }
        .logo:hover { transform: scale(1.02); }

        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a {
            text-decoration: none; color: #666666; font-size: 14px; font-weight: 400;
            transition: all 0.25s; position: relative; white-space: nowrap;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
            background: currentColor; transition: width 0.3s;
        }
        .nav-links a:hover::after,
        .nav-links a.active::after { width: 100%; }
        .nav-links a:hover { color: #1a1a1a; }
        .nav-links a.active { color: #1a1a1a; font-weight: 500; }

        .user-name {
            color: #666666; font-size: 14px; white-space: nowrap;
            max-width: 150px; overflow: hidden; text-overflow: ellipsis;
        }

        .btn {
            padding: 8px 20px; border-radius: 6px; text-decoration: none; font-size: 14px;
            font-weight: 400; transition: all 0.25s; border: none; cursor: pointer;
            background: none; white-space: nowrap;
        }
        .btn:active { transform: scale(0.98); }
        .btn-outline { border: 1px solid #d4d4d4; color: #1a1a1a; }
        .btn-outline:hover { border-color: #1a1a1a; background: #f5f5f5; }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 24px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 40px; }
        .kpi-card { background: #ffffff; padding: 28px; border-radius: 12px; border: 1px solid #e5e5e5; }
        .kpi-label { color: #666666; font-size: 14px; margin-bottom: 12px; }
        .kpi-value { font-size: 42px; font-weight: 500; color: #1a1a1a; letter-spacing: -1px; }

        .chart-container {
            background: #ffffff; padding: 28px; border-radius: 12px; border: 1px solid #e5e5e5;
            margin-bottom: 40px; height: 400px; position: relative;
        }
        .chart-container canvas { width: 100% !important; height: 300px !important; max-height: 300px; }
        .chart-title { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-bottom: 24px; }

        .feedbacks-table {
            background: #ffffff; padding: 28px; border-radius: 12px; border: 1px solid #e5e5e5;
        }
        .table-title { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; padding: 12px 16px; background: #fafafa; color: #666666;
            font-weight: 500; font-size: 13px; border-bottom: 1px solid #e5e5e5;
        }
        td { padding: 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        tbody tr { transition: background 0.2s; animation: slideIn 0.3s backwards; }
        tbody tr:nth-child(1) { animation-delay: 0.05s; }
        tbody tr:nth-child(2) { animation-delay: 0.1s; }
        tbody tr:nth-child(3) { animation-delay: 0.15s; }
        tbody tr:nth-child(4) { animation-delay: 0.2s; }
        tbody tr:nth-child(5) { animation-delay: 0.25s; }
        tbody tr:hover { background: rgba(0,0,0,0.02); }
        tr:last-child td { border-bottom: none; }

        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-new { background: #e0f2fe; color: #0369a1; }
        .status-in_progress { background: #fef3c7; color: #b45309; }
        .status-completed { background: #dcfce7; color: #166534; }
        .category-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }

        .loading { text-align: center; padding: 40px; color: #666666; animation: pulse 1.5s infinite; }
        .view-all { margin-top: 20px; text-align: right; }
        .view-all a { color: #1a1a1a; text-decoration: none; font-size: 14px; font-weight: 500; }
        .view-all a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .nav-links { flex-wrap: wrap; gap: 16px; }
            .kpi-grid { grid-template-columns: 1fr; gap: 16px; }
            .container { padding: 24px 16px; }
            table { display: block; overflow-x: auto; }
            .chart-container { height: 350px; }
            .chart-container canvas { height: 250px !important; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo">Feedback System</a>
        <div class="nav-links" id="navLinks"></div>
    </div>

    <div class="container">
        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-label">Total feedback</div><div class="kpi-value" id="totalFeedbacks">-</div></div>
            <div class="kpi-card"><div class="kpi-label">Positive</div><div class="kpi-value" id="positiveCount">-</div></div>
            <div class="kpi-card"><div class="kpi-label">Resolved issues</div><div class="kpi-value" id="completedCount">-</div></div>
        </div>

        <div class="chart-container">
            <div class="chart-title">Last 7 days</div>
            <canvas id="feedbackChart"></canvas>
        </div>

        <div class="feedbacks-table">
            <div class="table-title">Recent feedback</div>
            <div id="feedbacksLoading" class="loading">Loading...</div>
            <table id="feedbacksTable" style="display: none;">
                <thead><tr><th>Category</th><th>Message</th><th>Status</th><th>Date</th></tr></thead>
                <tbody id="feedbacksBody"></tbody>
            </table>
            <div class="view-all"><a href="feedbacks.html">View all feedback →</a></div>
        </div>
    </div>

    <script>
        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
            renderNavigation();
            setTimeout(loadDashboard, 50);
        }
        initTheme();

        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token) window.location.href = 'login.html';

        const sunIcon = `<svg class="theme-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
        const moonIcon = `<svg class="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

        function renderNavigation() {
            const nav = document.getElementById('navLinks');
            const isDark = document.body.classList.contains('dark-theme');
            nav.innerHTML = `
                <button class="theme-toggle" onclick="toggleTheme()"><span class="theme-icon">${isDark ? sunIcon : moonIcon}</span>${isDark ? 'Light' : 'Dark'}</button>
                <a href="index.html">Home</a>
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="feedbacks.html">All Feedback</a>
                <a href="profile.html">My Profile</a>
                <span class="user-name">${user.name || user.email}</span>
                <button class="btn btn-outline" onclick="logout()">Sign out</button>
            `;
        }
        renderNavigation();

        let chart = null;
        async function loadDashboard() {
            try {
                const aRes = await fetch('api/analytics/index.php', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!aRes.ok) throw new Error();
                const a = await aRes.json();

                document.getElementById('totalFeedbacks').textContent = a.total_feedbacks || 0;
                document.getElementById('positiveCount').textContent = a.by_category?.['Позитив'] || a.by_category?.['Positive'] || 0;
                document.getElementById('completedCount').textContent = a.by_status?.completed || 0;

                const ctx = document.getElementById('feedbackChart').getContext('2d');
                if (chart) chart.destroy();
                const isDark = document.body.classList.contains('dark-theme');
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: a.daily_stats?.map(d => d.date) || [],
                        datasets: [{
                            label: 'Feedback count', data: a.daily_stats?.map(d => d.count) || [],
                            borderColor: isDark ? '#ffffff' : '#1a1a1a',
                            backgroundColor: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(26,26,26,0.05)',
                            tension: 0.3, fill: true,
                            pointBackgroundColor: isDark ? '#ffffff' : '#1a1a1a',
                            pointBorderColor: isDark ? '#1a1a1a' : '#ffffff',
                            pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, grid: { color: isDark ? '#333333' : '#f0f0f0' }, ticks: { stepSize: 1, color: isDark ? '#e5e5e5' : '#1a1a1a' } },
                            x: { grid: { display: false }, ticks: { color: isDark ? '#e5e5e5' : '#1a1a1a' } }
                        }
                    }
                });

                const fRes = await fetch('api/feedbacks/list.php?size=5', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!fRes.ok) throw new Error();
                const f = await fRes.json();
                const tbody = document.getElementById('feedbacksBody');
                tbody.innerHTML = '';

                if (f.items?.length) {
                    f.items.forEach(item => {
                        const row = tbody.insertRow();
                        const cat = item.category_name || 'Unknown', catCol = item.category_color || '#999';
                        const stClass = item.status === 'in_progress' ? 'status-in_progress' : item.status === 'completed' ? 'status-completed' : 'status-new';
                        const stText = item.status === 'in_progress' ? 'In progress' : item.status === 'completed' ? 'Completed' : 'New';
                        row.innerHTML = `
                            <td><span class="category-indicator" style="background:${catCol};"></span>${cat}</td>
                            <td>${item.message.substring(0,60)}${item.message.length>60?'...':''}</td>
                            <td><span class="status-badge ${stClass}">${stText}</span></td>
                            <td>${new Date(item.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
                        `;
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No feedback yet</td></tr>';
                }
                document.getElementById('feedbacksLoading').style.display = 'none';
                document.getElementById('feedbacksTable').style.display = 'table';
            } catch {
                document.getElementById('feedbacksLoading').innerHTML = 'Error loading data.';
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        loadDashboard();
    </script>
</body>
</html>
