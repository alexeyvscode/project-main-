<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa; min-height: 100vh; color: #1a1a1a; line-height: 1.5;
            transition: background 0.3s, color 0.3s;
        }
        body.dark-theme { background: #0f0f0f; color: #e5e5e5; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .container { animation: fadeIn 0.5s ease-out; }
        .feedback-form-container { animation: scaleIn 0.4s ease-out; }

        body.dark-theme .header { background: #1a1a1a; border-bottom-color: #333333; }
        body.dark-theme .logo { color: #ffffff; }
        body.dark-theme .nav-links a { color: #999999; }
        body.dark-theme .nav-links a:hover,
        body.dark-theme .nav-links a.active { color: #ffffff; }
        body.dark-theme .btn-outline { border-color: #444444; color: #e5e5e5; }
        body.dark-theme .btn-outline:hover { border-color: #ffffff; background: #2a2a2a; }
        body.dark-theme .feedback-form-container { background: #1a1a1a; border-color: #333333; }
        body.dark-theme input, body.dark-theme textarea { background: #0f0f0f; border-color: #444444; color: #e5e5e5; }
        body.dark-theme input:focus, body.dark-theme textarea:focus { border-color: #ffffff; }
        body.dark-theme input::placeholder, body.dark-theme textarea::placeholder { color: #666666; }
        body.dark-theme .category-btn { background: #0f0f0f; border-color: #444444; color: #999999; }
        body.dark-theme .category-btn:hover { border-color: #666666; background: #2a2a2a; }
        body.dark-theme .category-btn.active { border-color: #ffffff; background: #ffffff; color: #0f0f0f; }
        body.dark-theme .user-status { background: #0f0f0f; border-color: #333333; color: #999999; }
        body.dark-theme .user-status a { color: #ffffff; }
        body.dark-theme .submit-btn { background: #ffffff; color: #0f0f0f; }
        body.dark-theme .submit-btn:hover { background: #e5e5e5; }
        body.dark-theme .hero h1 { color: #ffffff; }
        body.dark-theme .hero p { color: #999999; }
        body.dark-theme .form-title { color: #ffffff; }
        body.dark-theme label { color: #e5e5e5; }
        body.dark-theme .error-message { background: #3a1a1a; color: #fca5a5; border-color: #7f1d1d; }
        body.dark-theme .success-message { background: #1a3a2a; color: #86efac; border-color: #166534; }
        body.dark-theme .user-name { color: #999999; }

        .theme-toggle {
            background: none; border: 1px solid #d4d4d4; border-radius: 24px; padding: 6px 14px;
            cursor: pointer; font-size: 13px; font-weight: 500; display: flex; align-items: center;
            gap: 8px; transition: all 0.3s; margin-right: 8px; color: #1a1a1a;
        }
        body.dark-theme .theme-toggle { border-color: #444444; color: #e5e5e5; }
        .theme-toggle:hover { border-color: #1a1a1a; background: #f5f5f5; transform: scale(1.02); }
        body.dark-theme .theme-toggle:hover { border-color: #ffffff; background: #2a2a2a; }

        .theme-icon { width: 18px; height: 18px; display: inline-block; transition: transform 0.3s; }
        .theme-icon svg { width: 100%; height: 100%; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        body:not(.dark-theme) .theme-icon svg path { stroke: #1a1a1a; fill: #1a1a1a; }
        body.dark-theme .theme-icon svg circle,
        body.dark-theme .theme-icon svg line { stroke: #ffffff; }
        .theme-toggle:hover .theme-icon { transform: rotate(10deg); }

        .header {
            background: #ffffff; padding: 20px 40px; border-bottom: 1px solid #e5e5e5;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.3s, border-color 0.3s; min-height: 73px;
        }
        .logo {
            font-size: 20px; font-weight: 500; letter-spacing: -0.5px; color: #1a1a1a;
            transition: transform 0.3s, color 0.3s; display: inline-block;
        }
        .logo:hover { transform: scale(1.02); }

        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a {
            text-decoration: none; color: #666666; font-size: 14px; font-weight: 400;
            transition: all 0.25s; position: relative; white-space: nowrap;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
            background: currentColor; transition: width 0.3s;
        }
        .nav-links a:hover::after,
        .nav-links a.active::after { width: 100%; }
        .nav-links a:hover { color: #1a1a1a; }
        .nav-links a.active { color: #1a1a1a; font-weight: 500; }

        .user-name {
            color: #666666; font-size: 14px; white-space: nowrap;
            max-width: 150px; overflow: hidden; text-overflow: ellipsis;
        }

        .btn {
            padding: 8px 20px; border-radius: 6px; text-decoration: none; font-size: 14px;
            font-weight: 400; transition: all 0.25s; border: none; cursor: pointer;
            background: none; white-space: nowrap;
        }
        .btn:active { transform: scale(0.98); }
        .btn-outline { border: 1px solid #d4d4d4; color: #1a1a1a; }
        .btn-outline:hover { border-color: #1a1a1a; background: #f5f5f5; }

        .container { max-width: 1000px; margin: 0 auto; padding: 60px 24px; }
        .hero { text-align: center; margin-bottom: 48px; animation: fadeIn 0.6s ease-out; }
        .hero h1 { font-size: 40px; font-weight: 500; letter-spacing: -1px; margin-bottom: 16px; }
        .hero p { font-size: 16px; color: #666666; max-width: 500px; margin: 0 auto; }

        .feedback-form-container {
            background: #ffffff; max-width: 560px; margin: 0 auto; padding: 40px;
            border-radius: 12px; border: 1px solid #e5e5e5; transition: background 0.3s, border-color 0.3s;
        }
        .form-title { font-size: 24px; font-weight: 500; margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }

        input, textarea {
            width: 100%; padding: 12px 16px; border: 1px solid #d4d4d4; border-radius: 8px;
            font-size: 14px; transition: all 0.25s; font-family: inherit; background: #ffffff;
        }
        input:focus, textarea:focus {
            outline: none; border-color: #1a1a1a; box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
            transform: translateY(-1px);
        }
        input::placeholder, textarea::placeholder { color: #999999; }

        .category-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .category-btn {
            padding: 12px 16px; border: 1px solid #d4d4d4; border-radius: 8px;
            background: #ffffff; cursor: pointer; font-size: 13px; font-weight: 400;
            transition: all 0.25s; text-align: center; color: #666666;
        }
        .category-btn:hover { border-color: #999999; background: #fafafa; }
        .category-btn:active { transform: scale(0.98); }
        .category-btn.active { border-color: #1a1a1a; background: #1a1a1a; color: #ffffff; }

        .char-counter { text-align: right; font-size: 12px; color: #999999; margin-top: 6px; }

        .submit-btn {
            width: 100%; padding: 14px; background: #1a1a1a; color: #ffffff; border: none;
            border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.25s; position: relative; overflow: hidden;
        }
        .submit-btn:hover { background: #333333; }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
            border-radius: 50%; background: rgba(255,255,255,0.3);
            transform: translate(-50%,-50%); transition: width 0.5s, height 0.5s;
        }
        .submit-btn:active::after { width: 300px; height: 300px; }
        .submit-btn:disabled { background: #d4d4d4; cursor: not-allowed; }

        .success-message {
            background: #f0fdf4; color: #166534; padding: 14px 16px; border-radius: 8px;
            margin-bottom: 24px; font-size: 14px; border: 1px solid #bbf7d0; display: none;
        }
        .error-message {
            background: #fef2f2; color: #991b1b; padding: 14px 16px; border-radius: 8px;
            margin-bottom: 24px; font-size: 14px; border: 1px solid #fecaca; display: none;
        }
        .user-status {
            background: #f5f5f5; padding: 12px 16px; border-radius: 8px; margin-bottom: 28px;
            font-size: 13px; color: #666666; border: 1px solid #e5e5e5;
        }
        .user-status a { color: #1a1a1a; text-decoration: underline; }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .nav-links { flex-wrap: wrap; gap: 16px; }
            .hero h1 { font-size: 32px; }
            .category-buttons { grid-template-columns: 1fr; }
            .feedback-form-container { padding: 28px 20px; }
            .container { padding: 40px 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Feedback System</div>
        <div class="nav-links" id="navLinks"></div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>Share your feedback</h1>
            <p>Help us improve by sharing your ideas, reporting issues, or simply saying thanks</p>
        </div>

        <div class="feedback-form-container">
            <h2 class="form-title">Submit feedback</h2>
            <div class="success-message" id="successMessage">Thank you. Your feedback has been submitted.</div>
            <div class="error-message" id="errorMessage"></div>
            <div class="user-status" id="userStatus"></div>
            
            <form id="feedbackForm">
                <div class="form-group" id="nameGroup">
                    <label for="userName">Your name</label>
                    <input type="text" id="userName" placeholder="John Doe" minlength="2" maxlength="100">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <div class="category-buttons">
                        <div class="category-btn" data-category="1">Positive</div>
                        <div class="category-btn" data-category="2">Suggestion</div>
                        <div class="category-btn" data-category="3">Issue</div>
                    </div>
                    <input type="hidden" id="categoryId">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Describe your idea..." minlength="5" maxlength="500" required></textarea>
                    <div class="char-counter"><span id="charCount">0</span> / 500</div>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Submit feedback</button>
            </form>
        </div>
    </div>

    <script>
        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
            renderNavigation();
        }
        initTheme();

        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        const navLinks = document.getElementById('navLinks');

        const sunIcon = `<svg class="theme-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
        const moonIcon = `<svg class="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

        function renderNavigation() {
            const isDark = document.body.classList.contains('dark-theme');
            if (user) {
                navLinks.innerHTML = `
                    <button class="theme-toggle" onclick="toggleTheme()"><span class="theme-icon">${isDark ? sunIcon : moonIcon}</span>${isDark ? 'Light' : 'Dark'}</button>
                    <a href="index.html" class="active">Home</a>
                    <a href="dashboard.html">Dashboard</a>
                    <a href="feedbacks.html">All Feedback</a>
                    <a href="profile.html">My Profile</a>
                    <span class="user-name">${user.name || user.email}</span>
                    <button class="btn btn-outline" onclick="logout()">Sign out</button>
                `;
                document.getElementById('userStatus').innerHTML = `Signed in as <strong>${user.name || user.email}</strong> (${user.role === 'admin' ? 'Administrator' : 'Operator'})`;
                document.getElementById('nameGroup').style.display = 'none';
            } else {
                navLinks.innerHTML = `
                    <button class="theme-toggle" onclick="toggleTheme()"><span class="theme-icon">${isDark ? sunIcon : moonIcon}</span>${isDark ? 'Light' : 'Dark'}</button>
                    <a href="index.html" class="active">Home</a>
                    <span class="user-name" style="opacity:0.5;">Guest</span>
                    <a href="login.html" class="btn btn-outline">Sign in</a>
                `;
                document.getElementById('userStatus').innerHTML = `Not signed in. <a href="login.html">Sign in</a> to track your feedback.`;
            }
        }
        renderNavigation();

        const categoryBtns = document.querySelectorAll('.category-btn');
        const categoryInput = document.getElementById('categoryId');
        categoryBtns.forEach(btn => btn.addEventListener('click', function() {
            categoryBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            categoryInput.value = this.dataset.category;
        }));

        const msg = document.getElementById('message');
        const charCnt = document.getElementById('charCount');
        msg.addEventListener('input', () => charCnt.textContent = msg.value.length);

        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const ok = document.getElementById('successMessage');
            const err = document.getElementById('errorMessage');
            ok.style.display = 'none'; err.style.display = 'none';

            const cat = categoryInput.value;
            if (!cat) { err.textContent = 'Select category'; err.style.display = 'block'; return; }
            const message = msg.value.trim();
            if (message.length < 5) { err.textContent = 'Min 5 characters'; err.style.display = 'block'; return; }

            const data = { category_id: parseInt(cat), message };
            if (!user) {
                const name = document.getElementById('userName').value.trim();
                if (!name) { err.textContent = 'Enter name'; err.style.display = 'block'; return; }
                if (name.length < 2) { err.textContent = 'Min 2 characters'; err.style.display = 'block'; return; }
                data.user_name = name;
            }

            btn.disabled = true; btn.textContent = 'Submitting...';
            try {
                const h = { 'Content-Type': 'application/json' };
                if (token) h['Authorization'] = `Bearer ${token}`;
                const res = await fetch('api/feedbacks/create.php', { method: 'POST', headers: h, body: JSON.stringify(data) });
                const result = await res.json();
                if (res.ok) {
                    ok.style.display = 'block';
                    categoryBtns.forEach(b => b.classList.remove('active'));
                    categoryInput.value = ''; msg.value = ''; charCnt.textContent = '0';
                    if (!user) document.getElementById('userName').value = '';
                } else {
                    err.textContent = result.error || 'Error';
                    err.style.display = 'block';
                }
            } catch { err.textContent = 'Connection error'; err.style.display = 'block'; }
            finally { btn.disabled = false; btn.textContent = 'Submit feedback'; }
        });

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
