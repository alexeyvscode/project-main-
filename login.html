<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · Feedback System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa; min-height: 100vh; color: #1a1a1a; line-height: 1.5;
            transition: background 0.3s, color 0.3s;
        }
        body.dark-theme { background: #0f0f0f; color: #e5e5e5; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .container { animation: fadeIn 0.5s ease-out; }
        .login-container { animation: scaleIn 0.4s ease-out; }

        body.dark-theme .header { background: #1a1a1a; border-bottom-color: #333333; }
        body.dark-theme .logo { color: #ffffff; }
        body.dark-theme .nav-links a { color: #999999; }
        body.dark-theme .nav-links a:hover,
        body.dark-theme .nav-links a.active { color: #ffffff; }
        body.dark-theme .login-container { background: #1a1a1a; border-color: #333333; }
        body.dark-theme .login-title { color: #ffffff; }
        body.dark-theme .login-subtitle { color: #999999; }
        body.dark-theme label { color: #e5e5e5; }
        body.dark-theme input { background: #0f0f0f; border-color: #444444; color: #e5e5e5; }
        body.dark-theme input:focus { border-color: #ffffff; }
        body.dark-theme input::placeholder { color: #666666; }
        body.dark-theme .submit-btn { background: #ffffff; color: #0f0f0f; }
        body.dark-theme .submit-btn:hover { background: #e5e5e5; }
        body.dark-theme .error-message { background: #3a1a1a; color: #fca5a5; border-color: #7f1d1d; }
        body.dark-theme .test-accounts { border-top-color: #333333; }
        body.dark-theme .test-account-item { border-bottom-color: #2a2a2a; }
        body.dark-theme .test-account-item:hover { background: #2a2a2a; }
        body.dark-theme .test-account-credentials { color: #e5e5e5; }
        body.dark-theme .back-link { color: #999999; }
        body.dark-theme .back-link:hover { color: #ffffff; }
        body.dark-theme .user-name { color: #999999; }

        .theme-toggle {
            background: none; border: 1px solid #d4d4d4; border-radius: 24px; padding: 6px 14px;
            cursor: pointer; font-size: 13px; font-weight: 500; display: flex; align-items: center;
            gap: 8px; transition: all 0.3s; color: #1a1a1a;
        }
        body.dark-theme .theme-toggle { border-color: #444444; color: #e5e5e5; }
        .theme-toggle:hover { border-color: #1a1a1a; background: #f5f5f5; transform: scale(1.02); }
        body.dark-theme .theme-toggle:hover { border-color: #ffffff; background: #2a2a2a; }

        .theme-icon { width: 18px; height: 18px; display: inline-block; transition: transform 0.3s; }
        .theme-icon svg { width: 100%; height: 100%; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        body:not(.dark-theme) .theme-icon svg path { stroke: #1a1a1a; fill: #1a1a1a; }
        body.dark-theme .theme-icon svg circle,
        body.dark-theme .theme-icon svg line { stroke: #ffffff; }
        .theme-toggle:hover .theme-icon { transform: rotate(10deg); }

        .header {
            background: #ffffff; padding: 20px 40px; border-bottom: 1px solid #e5e5e5;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.3s, border-color 0.3s; min-height: 73px;
        }
        .logo {
            font-size: 20px; font-weight: 500; letter-spacing: -0.5px; color: #1a1a1a;
            text-decoration: none; transition: transform 0.3s, color 0.3s; display: inline-block;
        }
        .logo:hover { transform: scale(1.02); }

        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a {
            text-decoration: none; color: #666666; font-size: 14px; font-weight: 400;
            transition: all 0.25s; position: relative; white-space: nowrap;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
            background: currentColor; transition: width 0.3s;
        }
        .nav-links a:hover::after,
        .nav-links a.active::after { width: 100%; }
        .nav-links a:hover { color: #1a1a1a; }
        .nav-links a.active { color: #1a1a1a; font-weight: 500; }

        .user-name {
            color: #666666; font-size: 14px; white-space: nowrap;
            max-width: 150px; overflow: hidden; text-overflow: ellipsis;
        }

        .btn {
            padding: 8px 20px; border-radius: 6px; text-decoration: none; font-size: 14px;
            font-weight: 400; transition: all 0.25s; border: none; cursor: pointer;
            background: none; white-space: nowrap;
        }
        .btn-outline { border: 1px solid #d4d4d4; color: #1a1a1a; }
        .btn-outline:hover { border-color: #1a1a1a; background: #f5f5f5; }

        .container {
            max-width: 1000px; margin: 0 auto; padding: 80px 24px;
            display: flex; align-items: center; justify-content: center;
            min-height: calc(100vh - 73px);
        }
        .login-container {
            background: #ffffff; width: 100%; max-width: 420px; padding: 48px 40px;
            border-radius: 12px; border: 1px solid #e5e5e5;
        }
        .login-title { font-size: 28px; font-weight: 500; margin-bottom: 8px; }
        .login-subtitle { font-size: 14px; color: #666666; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }

        input {
            width: 100%; padding: 12px 16px; border: 1px solid #d4d4d4; border-radius: 8px;
            font-size: 14px; transition: all 0.25s; font-family: inherit; background: #ffffff;
        }
        input:focus {
            outline: none; border-color: #1a1a1a; box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
            transform: translateY(-1px);
        }
        input::placeholder { color: #999999; }

        .submit-btn {
            width: 100%; padding: 14px; background: #1a1a1a; color: #ffffff; border: none;
            border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.25s; margin-top: 8px; position: relative; overflow: hidden;
        }
        .submit-btn:hover { background: #333333; }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
            border-radius: 50%; background: rgba(255,255,255,0.3);
            transform: translate(-50%,-50%); transition: width 0.5s, height 0.5s;
        }
        .submit-btn:active::after { width: 300px; height: 300px; }
        .submit-btn:disabled { background: #d4d4d4; cursor: not-allowed; }

        .error-message {
            background: #fef2f2; color: #991b1b; padding: 12px 16px; border-radius: 8px;
            margin-bottom: 24px; font-size: 13px; border: 1px solid #fecaca; display: none;
        }
        .test-accounts { margin-top: 32px; padding-top: 24px; border-top: 1px solid #e5e5e5; }
        .test-accounts-title {
            font-size: 13px; font-weight: 500; color: #666666; margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .test-account-item {
            display: flex; justify-content: space-between; align-items: center; padding: 10px 0;
            border-bottom: 1px solid #f0f0f0; font-size: 13px; cursor: pointer;
            transition: background 0.2s, padding-left 0.2s;
        }
        .test-account-item:hover { padding-left: 8px; background: #fafafa; }
        .test-account-item:last-child { border-bottom: none; }
        .test-account-role { color: #666666; }
        .test-account-credentials { color: #1a1a1a; font-family: monospace; font-size: 12px; }
        .back-link { display: block; text-align: center; margin-top: 24px; font-size: 14px; color: #666666; text-decoration: none; }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .nav-links { flex-wrap: wrap; gap: 16px; }
            .container { padding: 40px 16px; }
            .login-container { padding: 32px 24px; }
            .login-title { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo">Feedback System</a>
        <div class="nav-links" id="navLinks"></div>
    </div>

    <div class="container">
        <div class="login-container">
            <h1 class="login-title">Sign in</h1>
            <p class="login-subtitle">Enter your credentials to access your account</p>
            <div class="error-message" id="errorMessage"></div>
            <form id="loginForm">
                <div class="form-group"><label for="email">Email</label><input type="email" id="email" placeholder="admin@company.com" required autofocus></div>
                <div class="form-group"><label for="password">Password</label><input type="password" id="password" placeholder="··········" required></div>
                <button type="submit" class="submit-btn" id="submitBtn">Sign in</button>
            </form>
            <div class="test-accounts">
                <div class="test-accounts-title">Test accounts</div>
                <div class="test-account-item"><span class="test-account-role">Administrator</span><span class="test-account-credentials">admin@company.com / password123</span></div>
                <div class="test-account-item"><span class="test-account-role">Operator</span><span class="test-account-credentials">ivan@company.com / password123</span></div>
            </div>
            <a href="index.html" class="back-link">← Back to home</a>
        </div>
    </div>

    <script>
        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
            renderNavigation();
        }
        initTheme();

        const sunIcon = `<svg class="theme-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
        const moonIcon = `<svg class="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

        function renderNavigation() {
            const nav = document.getElementById('navLinks');
            const isDark = document.body.classList.contains('dark-theme');
            nav.innerHTML = `
                <button class="theme-toggle" onclick="toggleTheme()"><span class="theme-icon">${isDark ? sunIcon : moonIcon}</span>${isDark ? 'Light' : 'Dark'}</button>
                <a href="index.html">Home</a>
                <span class="user-name" style="opacity:0.5;">Guest</span>
                <a href="login.html" class="btn btn-outline">Sign in</a>
            `;
        }
        renderNavigation();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('errorMessage');
            err.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { err.textContent = 'Enter email and password'; err.style.display = 'block'; return; }

            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                const res = await fetch('api/auth/login.php', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    err.textContent = data.error || 'Invalid credentials';
                    err.style.display = 'block';
                }
            } catch { err.textContent = 'Connection error'; err.style.display = 'block'; }
            finally { btn.disabled = false; btn.textContent = 'Sign in'; }
        });

        document.querySelectorAll('.test-account-item').forEach(item => {
            item.addEventListener('click', function() {
                const [email, password] = this.querySelector('.test-account-credentials').textContent.split(' / ');
                document.getElementById('email').value = email;
                document.getElementById('password').value = password;
            });
        });
    </script>
</body>
</html>
